kind = "web"
previewPath = "/"
title = "D4Digit"
version = "1.0.0"
id = "artifacts/d4digit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25759

[services.development]
run = "pnpm --filter @workspace/d4digit run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/d4digit", "run", "build" ]
publicDir = "artifacts/d4digit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25759"
BASE_PATH = "/"
